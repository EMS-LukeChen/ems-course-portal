<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>緊急救護｜急診醫學｜補給站</title>
<meta property="og:title" content="緊急救護｜急診醫學｜補給站">
<meta property="og:description" content="彙整課程活動與最新消息｜Emergency Medical Services | Emergency Medicine | Supply Station">
<meta property="og:url" content="https://ems-luke.github.io/ems-supply-station/">
<meta property="og:type" content="website">
<meta property="og:locale" content="zh_TW">
<meta name="description" content="彙整台灣急救醫療相關單位課程活動與最新消息">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f6f8;color:#1a1a1a;font-size:14px}
#hd{background:#1a7a3a;padding:10px 16px 8px}
/* 上半段：標題全寬，文字自然延伸不截斷 */
#hd-title-block{margin-bottom:5px;width:100%}
#hd-badge{font-size:10px;color:rgba(255,255,255,.7);white-space:normal;line-height:1.4;word-break:break-word;overflow-wrap:anywhere}
#hd-title{font-size:18px;font-weight:700;color:#fff;margin:2px 0;white-space:normal;line-height:1.3;word-break:break-word;overflow-wrap:anywhere}
#hd-sub{font-size:11.5px;color:rgba(255,255,255,.85);margin-bottom:3px}
#hd-motto{font-size:11px;color:#FFD600;font-style:italic;font-weight:500;margin-bottom:5px}
/* 下半段：左右並排 */
#hd-bottom-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding-top:5px;border-top:1px solid rgba(255,255,255,.15)}
/* 左：最後更新、製作、彙整三行，間距極窄 */
#hd-bottom-left{display:flex;flex-direction:column;gap:0px}
#updated,#hd-credit,#hd-note{display:block;line-height:1.4;font-size:10px;color:rgba(255,255,255,.75)}
/* 下方連結列：入口網、回饋、瀏覽次數 */
#hd-links{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:4px;width:100%}
#hd-email,#hd-portal{font-size:11px;color:rgba(255,255,255,.85);text-decoration:none;background:rgba(255,255,255,.15);border-radius:20px;padding:2px 10px;white-space:nowrap}
#hd-email:hover,#hd-portal:hover{background:rgba(255,255,255,.25)}
#hd-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}

/* ── Type tabs（課程/消息）── */
#type-tabs{background:#FFD600;display:flex;padding:0 12px}
.type-tab{padding:8px 18px;font-size:12.5px;font-weight:600;color:rgba(0,0,0,.5);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.type-tab.on{color:#1a1a1a;border-bottom-color:#1a7a3a;font-weight:700}

/* ── Sub tabs（列表/行事曆）── */
#sub-tabs{background:#FFF9C4;border-bottom:1px solid #e5d900;display:flex}
.sub-tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:#555;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.sub-tab.on{color:#1a1a1a;border-bottom-color:#1a7a3a;font-weight:700}

/* ── Stat bar ── */
#stat-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:6px 14px;display:flex;gap:14px;font-size:11.5px;color:#666}
#stat-bar span b{color:#1a56b0;font-weight:700}

/* ── Filters ── */
#filters{background:#fff;border-bottom:1px solid #e5e7eb;padding:7px 12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.si{position:relative;flex:1;min-width:150px;max-width:250px}
.si span{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:12px}
.si input{width:100%;padding:5px 10px 5px 26px;font-size:12px;border:1px solid #d1d5db;border-radius:20px;font-family:inherit;background:#f9fafb}
.si input:focus{outline:2px solid #3b82f6;border-color:transparent;background:#fff}
select{font-size:12px;padding:5px 10px;border:1px solid #d1d5db;border-radius:20px;font-family:inherit;background:#f9fafb;color:#555;cursor:pointer}
label{display:flex;align-items:center;gap:5px;font-size:12px;color:#555;cursor:pointer}
#filter-count{font-size:11px;color:#888;margin-left:auto;white-space:nowrap}

/* ── List ── */
main{padding:10px 12px 40px;max-width:1100px;margin:0 auto}
.course-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:10px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;transition:box-shadow .15s}
.course-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ci-date{flex-shrink:0;text-align:center;background:#f0f4ff;border-radius:8px;padding:5px 9px;min-width:50px}
.ci-month{font-size:9.5px;color:#1a56b0;font-weight:600;text-transform:uppercase}
.ci-day{font-size:19px;font-weight:700;color:#1a56b0;line-height:1}
.ci-nodate{font-size:9.5px;color:#aaa;padding:8px 4px;line-height:1.3}
.ci-body{flex:1;min-width:0}
.ci-title{font-size:12.5px;font-weight:600;color:#111;line-height:1.4;margin-bottom:4px}
.ci-title a{color:inherit;text-decoration:none}
.ci-title a:hover{color:#1a56b0}
.ci-dates{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.ci-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ci-source{font-size:10px;color:#555;background:#f0f2f5;border-radius:20px;padding:1px 8px}
.ci-cat{font-size:10px;border-radius:20px;padding:1px 8px;font-weight:500}
.cat-tw-med{background:#ede9fe;color:#5b21b6}
.cat-tw-assoc{background:#d1fae5;color:#065f46}
.cat-tw-ems{background:#fef3c7;color:#92400e}
.cat-intl{background:#dbeafe;color:#1e40af}
.cat-tccc{background:#fee2e2;color:#991b1b}
.ci-expired{opacity:.42}
.badge-expired{font-size:9px;background:#fee2e2;color:#b91c1c;border-radius:20px;padding:1px 6px}
.badge-deadline{font-size:9px;background:#fef3c7;color:#92400e;border-radius:20px;padding:1px 6px}
.badge-event{font-size:9px;background:#dbeafe;color:#1e40af;border-radius:20px;padding:1px 6px}

/* ── Cal ── */
#cal-view{display:none}
#cal-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:10px 0}
#cal-nav button{background:none;border:1px solid #d1d5db;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px}
#cal-label{font-size:15px;font-weight:600}
/* 圖例 */
#cal-legend{display:flex;gap:12px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-dot.course{background:#1a56b0}
.legend-dot.news{background:#6b7280}
.legend-dot.tccc{background:#dc2626}
.legend-dot.multi{background:#1a7a3a}
/* 月曆格子 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:#888;padding:4px}
.cal-cell{min-height:52px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:4px;cursor:pointer;transition:border-color .15s}
.cal-cell:hover:not(.other-month){border-color:#1a7a3a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.cal-cell.other-month{background:#f9fafb;opacity:.4;cursor:default}
.cal-cell.today .cal-day-num{color:#1a7a3a;font-weight:700}
.cal-cell.today{border-color:#1a7a3a;border-width:2px}
.cal-cell.selected{border-color:#1a7a3a;border-width:2px;background:#f0fdf4}
.cal-day-num{font-size:11px;color:#666;margin-bottom:3px}
/* 色塊 */
.cal-dots{display:none}
.cal-count{font-size:9px;color:#888;margin-top:1px}
/* 日期數字背景色塊 */
.cal-day-num{font-size:11px;color:#666;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500}
.has-course .cal-day-num{background:#1a56b0;color:#fff;font-weight:700}
.has-news .cal-day-num{background:#dc2626;color:#fff;font-weight:700}
.has-both .cal-day-num{background:linear-gradient(135deg,#1a56b0 50%,#dc2626 50%);color:#fff;font-weight:700}
/* 選取日期的詳細列表 */
#cal-detail{margin-top:12px;border-top:2px solid #1a7a3a;padding-top:10px}
#cal-detail-title{font-size:12px;font-weight:600;color:#1a7a3a;margin-bottom:8px}

.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.loading{text-align:center;padding:30px;color:#1a56b0;font-size:13px}
footer{text-align:center;padding:13px;font-size:11px;color:#aaa;border-top:1px solid #e5e7eb;background:#fff;line-height:1.9}
footer strong{color:#666}
footer a{color:#1a56b0;text-decoration:none}
</style>
</head>
<body>

<div id="hd">
  <!-- 上半段：標題全寬顯示 -->
  <div id="hd-title-block">
    <div id="hd-badge">Emergency Medical Services | Emergency Medicine | Supply Station</div>
    <div id="hd-title">緊急救護｜急診醫學｜補給站</div>
    <div id="hd-sub">彙整課程活動與最新消息</div>
    <div id="hd-motto">－「你現在所做的學習，將有機會挽救生命。」</div>
  </div>
  <!-- 下半段：左邊時間/製作/彙整，連結列在更新時間下方 -->
  <div id="hd-bottom-row">
    <div id="hd-bottom-left">
      <span id="hd-note">彙整顯示資料僅供參考，依各官方網站資訊為主</span>
      <span id="hd-credit">製作：臺南市救護義消 陳冠言</span>
      <span id="updated">載入中…</span>
      <div id="hd-links">
        <a href="https://ems-luke.github.io/ems-information-portal/" id="hd-portal">👉 救護資訊入口網</a>
        <a href="mailto:luke01791910@gmail.com" id="hd-email">📩 回饋意見</a>
        <img src="https://hits.sh/ems-luke.github.io/ems-supply-station.svg?label=%E7%80%8F%E8%A6%BD%E6%AC%A1%E6%95%B8&color=FFD600&labelColor=555555&style=flat-square" alt="瀏覽次數" style="height:18px">
      </div>
    </div>
  </div>
</div>

<!-- 課程 / 消息 切換 -->
<div id="type-tabs">
  <div class="type-tab on" onclick="setType('all',this)">📋 全部</div>
  <div class="type-tab" onclick="setType('course',this)">🎓 課程 &amp; 活動</div>
  <div class="type-tab" onclick="setType('news',this)">📢 最新消息</div>
</div>

<!-- 列表 / 行事曆 -->
<div id="sub-tabs">
  <div class="sub-tab on" onclick="switchSub('list',this)">≡ 列表</div>
  <div class="sub-tab" onclick="switchSub('cal',this)">📅 行事曆</div>
</div>

<!-- 統計 -->
<div id="stat-bar">
  <span>課程：<b id="s-course">-</b></span>
  <span>消息：<b id="s-news">-</b></span>
  <span>總計：<b id="s-total">-</b></span>
</div>

<!-- 篩選 -->
<div id="filters">
  <div class="si"><span>🔍</span><input id="q" placeholder="搜尋標題…" oninput="applyFilters()" autocomplete="off"></div>
  <select id="f-cat" onchange="applyFilters()">
    <option value="">全部分類</option>
    <option value="台灣學會">台灣學會</option>
    <option value="台灣協會">台灣協會</option>
    <option value="台灣急救社群">台灣急救社群</option>
    <option value="戰術救護">戰術救護</option>
    <option value="國際期刊/組織">國際期刊/組織</option>
  </select>
  <select id="f-src" onchange="applyFilters()">
    <option value="">全部來源</option>
  </select>
  <label><input type="checkbox" id="f-hide-expired" onchange="applyFilters()"> 隱藏已結束</label>
  <span id="filter-count"></span>
</div>

<main>
  <div id="list-view"><div class="loading">⏳ 載入資料中…</div></div>
  <div id="cal-view">
    <div id="cal-nav">
      <button onclick="calPrev()">‹</button>
      <span id="cal-label"></span>
      <button onclick="calNext()">›</button>
    </div>
    <div id="cal-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1a56b0"></div>課程/活動</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>最新消息</div>
      <div class="legend-item" style="font-size:10px;color:#aaa">（點擊日期查看詳細）</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="cal-detail" style="display:none">
      <div id="cal-detail-title"></div>
      <div id="cal-detail-list"></div>
    </div>
  </div>
</main>



<script>
let ALL=[], FILTERED=[];
let CUR_TYPE='all', CUR_SUB='list';
let CAL_YEAR=new Date().getFullYear(), CAL_MONTH=new Date().getMonth();
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MO_ZH=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAY_ZH=['日','一','二','三','四','五','六'];

async function loadData(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/ems-luke/ems-supply-station/main/data/courses.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const j=await res.json();
    ALL=j.items||[];
    if(j.updated){
      const utc=new Date(j.updated);
      const tw=new Date(utc.getTime()+8*60*60*1000);
      const pad=n=>String(n).padStart(2,'0');
      const twStr=tw.getUTCFullYear()+'/'+pad(tw.getUTCMonth()+1)+'/'+pad(tw.getUTCDate())+' '+pad(tw.getUTCHours())+':'+pad(tw.getUTCMinutes());
      document.getElementById('updated').textContent='最後更新：'+twStr;
    }else{document.getElementById('updated').textContent='最後更新：未知';}
    document.getElementById('s-course').textContent=j.course_count||ALL.filter(i=>i.type==='course').length;
    document.getElementById('s-news').textContent=j.news_count||ALL.filter(i=>i.type==='news').length;
    document.getElementById('s-total').textContent=j.count||ALL.length;
    buildSrcFilter();
    applyFilters();
  }catch(e){
    document.getElementById('list-view').innerHTML='<div class="empty">⚠️ 無法載入：'+e.message+'</div>';
    document.getElementById('updated').textContent='⚠️ 載入失敗';
  }
}

function buildSrcFilter(){
  const sel=document.getElementById('f-src');
  [...new Set(ALL.map(i=>i.source))].sort().forEach(s=>{
    const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);
  });
}

function setType(t,btn){
  CUR_TYPE=t;
  document.querySelectorAll('.type-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilters();
}

function switchSub(s,btn){
  CUR_SUB=s;
  document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('list-view').style.display=s==='list'?'block':'none';
  document.getElementById('cal-view').style.display=s==='cal'?'block':'none';
  if(s==='cal')renderCal();
}

function applyFilters(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const cat=document.getElementById('f-cat').value;
  const src=document.getElementById('f-src').value;
  const hideExp=document.getElementById('f-hide-expired').checked;
  const today=new Date().toISOString().slice(0,10);
  FILTERED=ALL.filter(it=>{
    if(CUR_TYPE!=='all'&&it.type!==CUR_TYPE)return false;
    if(q&&!it.title.toLowerCase().includes(q)&&!it.source.toLowerCase().includes(q))return false;
    if(cat&&it.cat!==cat)return false;
    if(src&&it.source!==src)return false;
    if(hideExp&&it.date&&it.date<today)return false;
    return true;
  });
  document.getElementById('filter-count').textContent=`顯示 ${FILTERED.length} 筆`;
  if(CUR_SUB==='list')renderList();else renderCal();
}

function fmtD(ds){
  if(!ds)return null;
  const[y,m,d]=ds.split('-');
  return{y,mo:MO_ZH[parseInt(m)-1],moEn:MO[parseInt(m)-1],d:parseInt(d)};
}
function fmtFull(ds){
  if(!ds)return null;
  const[y,m,d]=ds.split('-');
  return`${y}/${parseInt(m)}/${parseInt(d)}`;
}
function catCls(cat){
  return({'台灣學會':'cat-tw-med','台灣協會':'cat-tw-assoc','台灣急救社群':'cat-tw-ems','戰術救護':'cat-tccc','國際期刊/組織':'cat-intl'})[cat]||'cat-intl';
}

function renderList(){
  const el=document.getElementById('list-view');
  if(!FILTERED.length){el.innerHTML='<div class="empty">😶 目前沒有符合條件的資料</div>';return;}
  const today=new Date().toISOString().slice(0,10);
  el.innerHTML=FILTERED.map(it=>{
    const exp=it.date&&it.date<today;
    const d=fmtD(it.date);
    const dateBox=d
      ?`<div class="ci-date"><div class="ci-month">${d.mo}</div><div class="ci-day">${d.d}</div></div>`
      :`<div class="ci-date"><div class="ci-nodate">日期<br>未定</div></div>`;
    const evB=it.date?`<span class="badge-event">📅 ${fmtFull(it.date)}</span>`:'';
    const dlB=it.deadline?`<span class="badge-deadline">⏰ 截止 ${fmtFull(it.deadline)}</span>`:'';
    const expB=exp?'<span class="badge-expired">已結束</span>':'';
    const typeIcon=it.type==='course'?'🎓':'📢';
    return`<div class="course-item${exp?' ci-expired':''}">
      ${dateBox}
      <div class="ci-body">
        <div class="ci-title">${typeIcon} <a href="${it.url||'#'}" target="_blank" rel="noopener">${it.title}</a></div>
        <div class="ci-dates">${evB}${dlB}${expB}</div>
        <div class="ci-meta"><span class="ci-source">${it.source}</span><span class="ci-cat ${catCls(it.cat)}">${it.cat}</span></div>
      </div>
    </div>`;
  }).join('');
}

let SEL_DATE = null;

function renderCal(){
  document.getElementById('cal-label').textContent=`${CAL_YEAR} 年 ${MO_ZH[CAL_MONTH]}`;
  // 建立日期 → 活動 map
  const byDate={};
  FILTERED.forEach(it=>{
    if(!it.date)return;
    const[y,m]=it.date.split('-').map(Number);
    if(y===CAL_YEAR&&m-1===CAL_MONTH){
      if(!byDate[it.date])byDate[it.date]=[];
      byDate[it.date].push(it);
    }
  });
  const grid=document.getElementById('cal-grid');
  const today=new Date().toISOString().slice(0,10);
  let h=DAY_ZH.map(d=>`<div class="cal-head">${d}</div>`).join('');
  const first=new Date(CAL_YEAR,CAL_MONTH,1);
  const pad=first.getDay();
  const dim=new Date(CAL_YEAR,CAL_MONTH+1,0).getDate();
  const prev=new Date(CAL_YEAR,CAL_MONTH,0).getDate();
  // 上月補白
  for(let i=pad-1;i>=0;i--)
    h+=`<div class="cal-cell other-month"><div class="cal-day-num">${prev-i}</div></div>`;
  // 本月格子
  for(let d=1;d<=dim;d++){
    const ds=`${CAL_YEAR}-${String(CAL_MONTH+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=byDate[ds]||[];
    const isToday=ds===today;
    const isSel=ds===SEL_DATE;
    // 判斷類型決定色塊 class
    let cellCls='cal-cell';
    if(isToday)cellCls+=' today';
    if(isSel)cellCls+=' selected';
    let countHtml='';
    if(evs.length>0){
      const hasCourse=evs.some(e=>e.type==='course');
      const hasNews=evs.some(e=>e.type==='news');
      if(hasCourse&&hasNews)cellCls+=' has-both';
      else if(hasCourse)cellCls+=' has-course';
      else if(hasNews)cellCls+=' has-news';
      countHtml=`<div class="cal-count">${evs.length}筆</div>`;
    }
    h+=`<div class="${cellCls}" onclick="selectDate('${ds}')">
      <div class="cal-day-num">${d}</div>
      ${countHtml}
    </div>`;
  }
  // 下月補白
  const total=pad+dim;
  const next=7-(total%7);
  if(next<7)for(let d=1;d<=next;d++)
    h+=`<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
  grid.innerHTML=h;
  // 重新渲染選取日期的詳細列表
  if(SEL_DATE)renderCalDetail(byDate[SEL_DATE]||[]);
}

function selectDate(ds){
  SEL_DATE = SEL_DATE===ds ? null : ds; // 再點一次取消選取
  renderCal();
  if(!SEL_DATE){
    document.getElementById('cal-detail').style.display='none';
    return;
  }
  const byDate={};
  FILTERED.forEach(it=>{
    if(it.date===ds){
      if(!byDate[ds])byDate[ds]=[];
      byDate[ds].push(it);
    }
  });
  renderCalDetail(byDate[ds]||[]);
}

function renderCalDetail(evs){
  const detail=document.getElementById('cal-detail');
  const title=document.getElementById('cal-detail-title');
  const list=document.getElementById('cal-detail-list');
  if(!evs.length){detail.style.display='none';return;}
  // 格式化標題日期
  const[y,m,d]=SEL_DATE.split('-');
  title.textContent=`${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日 — ${evs.length} 筆活動`;
  detail.style.display='block';
  // 詳細列表（複用 renderList 的卡片樣式）
  const today=new Date().toISOString().slice(0,10);
  list.innerHTML=evs.map(it=>{
    const exp=it.date&&it.date<today;
    const evB=it.date?`<span class="badge-event">📅 ${fmtFull(it.date)}</span>`:'';
    const dlB=it.deadline?`<span class="badge-deadline">⏰ 截止 ${fmtFull(it.deadline)}</span>`:'';
    const expB=exp?'<span class="badge-expired">已結束</span>':'';
    const typeIcon=it.type==='course'?'🎓':'📢';
    return`<div class="course-item${exp?' ci-expired':''}">
      <div class="ci-body">
        <div class="ci-title">${typeIcon} <a href="${it.url||'#'}" target="_blank" rel="noopener">${it.title}</a></div>
        <div class="ci-dates">${evB}${dlB}${expB}</div>
        <div class="ci-meta"><span class="ci-source">${it.source}</span><span class="ci-cat ${catCls(it.cat)}">${it.cat}</span></div>
      </div>
    </div>`;
  }).join('');
}

function calPrev(){
  SEL_DATE=null;
  document.getElementById('cal-detail').style.display='none';
  if(CAL_MONTH--===0){CAL_MONTH=11;CAL_YEAR--;}
  renderCal();
}
function calNext(){
  SEL_DATE=null;
  document.getElementById('cal-detail').style.display='none';
  if(++CAL_MONTH===12){CAL_MONTH=0;CAL_YEAR++;}
  renderCal();
}

loadData();
</script>
</body>
</html>
