name: 自動更新課程資料

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行爬蟲
        run: python scraper.py

      - name: 提交更新結果
        run: |
          git config user.name  "EMS Course Bot"
          git config user.email "bot@emsipbyluke.netlify.app"
          git add data/courses.json docs/feed.xml
          git diff --staged --quiet || git commit -m "自動更新課程資料 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
